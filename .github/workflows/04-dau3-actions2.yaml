name: 01 - CWVJ Flask CI Pipeline

on:
  push:

jobs:
  flask-ci-job-2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Login to Dockerhub
        uses:  docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOCKEN}}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: myidsaravanesh/github-actions-flask-app:v1.0.1
        

      - name: Run Container
        run: docker run -d -p 5000:5000 --name castus-flask-container myidsaravanesh/github-actions-flask-app:v1.0.1

      - name: Smoke Test
        run: |
          sleep 5
          curl http://localhost:5000/health